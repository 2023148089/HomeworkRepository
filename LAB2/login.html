<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Login</title>
    <link rel="stylesheet" type="text/css" href="main.css">
</head>
<body>
    <h1>Welcome to INTERNET-PROGRAMMING MOVIE SITE</h1>

    <p>
        <a href="login.html">로그인</a> |
        <a href="signup.html">회원가입</a>
    </p>

    <div class="loginbox">
        <form method="get" action="">
            <p>
                <label>아이디 :</label>
                <input type="text" name="loginid" placeholder="아이디 입력" required>
            </p>

            <p>
                <label>비밀번호 :</label>
                <input type="password" name="loginpw" placeholder="비밀번호 입력" required>
            </p>

            <p class="buttonline">
                <input class="signupbtn" type="submit" value="Login">
                <input class="cancelbtn" type="reset" value="Cancel">
            </p>
        </form>
    </div>
</body>
</html>
