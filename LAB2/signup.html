<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Signup</title>
    <link rel="stylesheet" type="text/css" href="main.css">
</head>
<body>
    <h1>Welcome to INTERNET-PROGRAMMING MOVIE SITE</h1>

    <p>
        <a href="login.html">로그인</a> |
        <a href="signup.html">회원가입</a>
    </p>

    <div class="box">
        <form method="get" action="login.html">
            <p>
                <label>이름 :</label>
                <input type="text" name="name" autofocus autocomplete="on" required>
            </p>

            <p>
                <label>생일 :</label>
                <input type="date" name="birth">
            </p>

            <p>
                <label>성별 :</label>
                <input class="radio" type="radio" name="gender" value="male"> 남성
                <input class="radio" type="radio" name="gender" value="female"> 여성
            </p>

            <p>
                <label>학년 :</label>
                <input type="number" name="grade" min="1" max="4" step="1" value="1">
            </p>

            <p>
                <label>아이디 :</label>
                <input type="text" name="userid" placeholder="아이디 입력" required>
            </p>

            <p>
                <label>비밀번호 :</label>
                <input type="password" name="pw" placeholder="비밀번호 입력" required>
            </p>

            <p>
                <label>이메일 :</label>
                <input type="email" name="email" placeholder="name@domain.com" required>
            </p>

            <p>
                <label>보안 질문 :</label>
                <select name="question">
                    <option value="">질문을 선택하세요</option>
                    <option value="1">내가 나온 초등학교 이름은?</option>
                    <option value="2">내 첫 반려동물 이름은?</option>
                    <option value="3">내가 태어난 도시는?</option>
                </select>
            </p>

            <p>
                <label>답변 :</label>
                <input type="text" name="answer" placeholder="답변 입력" required>
            </p>

            <p class="buttonline">
                <input class="signupbtn" type="submit" value="Signup">
                <input class="cancelbtn" type="reset" value="Cancel">
            </p>
        </form>
    </div>
</body>
</html>
